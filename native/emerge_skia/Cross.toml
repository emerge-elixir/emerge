# These package installs run inside cross's Debian-based build image, not on the
# host machine. Local source builds on Arch or other distros still use the host
# toolchain and system libraries directly.
[build.env]
passthrough = ["RUSTFLAGS", "RUSTLER_PRECOMPILED_DEBUG_MODE", "DRY_RUN"]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update",
    "apt-get install --assume-yes libegl1-mesa-dev:$CROSS_DEB_ARCH libgbm-dev:$CROSS_DEB_ARCH libdrm-dev:$CROSS_DEB_ARCH libfontconfig1-dev:$CROSS_DEB_ARCH libfreetype6-dev:$CROSS_DEB_ARCH libwayland-dev:$CROSS_DEB_ARCH libxkbcommon-dev:$CROSS_DEB_ARCH",
]
