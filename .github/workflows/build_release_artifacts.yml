name: Build Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.name }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.15"]
        job:
          - name: linux_wayland
            target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            use_cross: false
            variant: ""
            cargo_args: "--no-default-features --features wayland"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libfontconfig1-dev libfreetype6-dev libwayland-dev libxkbcommon-dev"
          - name: linux_drm
            target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            use_cross: false
            variant: "drm"
            cargo_args: "--no-default-features --features drm"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libfontconfig1-dev libfreetype6-dev libxkbcommon-dev"
          - name: linux_drm_wayland
            target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            use_cross: false
            variant: "drm_wayland"
            cargo_args: "--no-default-features --features wayland,drm"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libfontconfig1-dev libfreetype6-dev libwayland-dev libxkbcommon-dev"
          - name: linux_aarch64_wayland
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            use_cross: false
            variant: ""
            cargo_args: "--no-default-features --features wayland"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libfontconfig1-dev libfreetype6-dev libwayland-dev libxkbcommon-dev"
          - name: linux_aarch64_drm
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            use_cross: false
            variant: "drm"
            cargo_args: "--no-default-features --features drm"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libfontconfig1-dev libfreetype6-dev libxkbcommon-dev"
          - name: linux_aarch64_drm_wayland
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            use_cross: false
            variant: "drm_wayland"
            cargo_args: "--no-default-features --features wayland,drm"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libfontconfig1-dev libfreetype6-dev libwayland-dev libxkbcommon-dev"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Set up Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.0"
          otp-version: "28.3"

      - name: Install dependencies
        run: mix deps.get

      - name: Extract project version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            project_version="${GITHUB_REF_NAME#v}"
          else
            # Avoid custom Mix tasks here because they compile the project and can
            # trigger a host NIF build before this job installs native packages.
            project_version="$(awk -F'"' '/^  @version "/ { print $2; exit }' mix.exs)"
          fi

          if [[ -z "$project_version" ]]; then
            echo "Failed to resolve project version" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* && "v${project_version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match project version ${project_version}" >&2
            exit 1
          fi

          echo "PROJECT_VERSION=$project_version" >> "$GITHUB_ENV"

      - name: Install Linux build dependencies
        if: ${{ matrix.job.system_packages != '' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes ${{ matrix.job.system_packages }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.job.target }}

      - name: Build the project
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: emerge_skia
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use_cross && 'true' || '' }}
          project-dir: native/emerge_skia
          variant: ${{ matrix.job.variant }}
          cargo-args: ${{ matrix.job.cargo_args }}

      - name: Artifact upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

      - name: Publish archives and packages
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build-crate.outputs.file-path }}

  build_macos_host:
    name: macos_host - ${{ matrix.job.name }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - name: macos_arm64
            target: aarch64-apple-darwin
            os: macos-15
          - name: macos_x86_64
            target: x86_64-apple-darwin
            os: macos-15-intel

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Set up Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.0"
          otp-version: "28.3"

      - name: Install dependencies
        run: mix deps.get

      - name: Extract project version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            project_version="${GITHUB_REF_NAME#v}"
          else
            # Avoid custom Mix tasks here because they compile the project and can
            # trigger a host NIF build before this job installs native packages.
            project_version="$(awk -F'"' '/^  @version "/ { print $2; exit }' mix.exs)"
          fi

          if [[ -z "$project_version" ]]; then
            echo "Failed to resolve project version" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* && "v${project_version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match project version ${project_version}" >&2
            exit 1
          fi

          echo "PROJECT_VERSION=$project_version" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.job.target }}

      - name: Build macos_host
        working-directory: native/emerge_skia
        run: >
          cargo build --release
          --bin macos_host
          --no-default-features
          --features macos

      - name: Package macos_host archive
        shell: bash
        run: |
          mkdir -p dist
          cp native/emerge_skia/target/release/macos_host dist/macos_host
          chmod 755 dist/macos_host
          archive="macos_host-v${PROJECT_VERSION}-${{ matrix.job.target }}.tar.gz"
          tar -C dist -czf "$archive" macos_host
          shasum -a 256 "$archive" > "$archive.sha256"
          echo "ARCHIVE_NAME=$archive" >> "$GITHUB_ENV"

      - name: Artifact upload
        uses: actions/upload-artifact@v6
        with:
          name: macos_host-v${{ env.PROJECT_VERSION }}-${{ matrix.job.target }}
          path: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256

      - name: Publish macos_host archives
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256
