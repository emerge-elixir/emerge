name: Hex Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish (tag or branch)
        required: true
        default: main
  workflow_run:
    workflows: ["Build Release Artifacts"]
    types: [completed]

jobs:
  publish:
    name: Publish Hex package
    runs-on: ubuntu-24.04
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    permissions:
      contents: read

    steps:
      - name: Checkout source code (manual)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Checkout source code (after precompiled build)
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.0"
          otp-version: "28.3"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1-mesa-dev \
            libgbm-dev \
            libdrm-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Install dependencies
        run: mix deps.get

      - name: Extract project version
        shell: bash
        run: |
          # Avoid custom Mix tasks here because they compile the project and can
          # trigger a host NIF build before native packages are installed.
          project_version="$(awk -F'"' '/^  @version "/ { print $2; exit }' mix.exs)"

          if [[ -z "$project_version" ]]; then
            echo "Failed to resolve project version" >&2
            exit 1
          fi

          echo "PROJECT_VERSION=$project_version" >> "$GITHUB_ENV"

      - name: Verify macOS host release assets exist
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          release_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/v${PROJECT_VERSION}"
          release_json="$(mktemp)"
          missing_assets_file="$(mktemp)"

          for attempt in $(seq 1 30); do
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "User-Agent: emerge-skia-release" \
              "$release_url" > "$release_json"

            : > "$missing_assets_file"

            for asset in \
              "macos_host-v${PROJECT_VERSION}-aarch64-apple-darwin.tar.gz" \
              "macos_host-v${PROJECT_VERSION}-aarch64-apple-darwin.tar.gz.sha256" \
              "macos_host-v${PROJECT_VERSION}-x86_64-apple-darwin.tar.gz" \
              "macos_host-v${PROJECT_VERSION}-x86_64-apple-darwin.tar.gz.sha256"
            do
              if ! grep -F '"name": "'"$asset"'"' "$release_json" >/dev/null; then
                printf '%s\n' "$asset" >> "$missing_assets_file"
              fi
            done

            if [[ ! -s "$missing_assets_file" ]]; then
              exit 0
            fi

            if [[ "$attempt" -lt 30 ]]; then
              echo "Waiting for macOS host release assets to appear (attempt ${attempt}/30)"
              sleep 10
            fi
          done

          while IFS= read -r asset; do
            echo "Missing required macOS host release asset: $asset" >&2
          done < "$missing_assets_file"

          exit 1

      - name: Generate precompiled checksum file
        env:
          EMERGE_SKIA_CHECKSUM_ONLY: "true"
          MIX_ENV: prod
        run: mix rustler_precompiled.download EmergeSkia.Native --all --print

      - name: Verify Hex package contents
        run: mix hex.build --unpack

      - name: Publish package and docs to Hex
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        shell: bash
        run: |
          unset HEX_ORGANIZATION
          mix hex.publish --yes
