name: Build Precompiled NIFs

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.name }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.15"]
        job:
          - name: linux_wayland
            target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            use_cross: false
            variant: ""
            cargo_args: "--no-default-features --features wayland"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libfontconfig1-dev libfreetype6-dev libwayland-dev libxkbcommon-dev"
          - name: linux_drm
            target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            use_cross: false
            variant: "drm"
            cargo_args: "--no-default-features --features drm"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libfontconfig1-dev libfreetype6-dev libxkbcommon-dev"
          - name: linux_drm_wayland
            target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            use_cross: false
            variant: "drm_wayland"
            cargo_args: "--no-default-features --features wayland,drm"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libfontconfig1-dev libfreetype6-dev libwayland-dev libxkbcommon-dev"
          - name: linux_aarch64_wayland
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            use_cross: false
            variant: ""
            cargo_args: "--no-default-features --features wayland"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libfontconfig1-dev libfreetype6-dev libwayland-dev libxkbcommon-dev"
          - name: linux_aarch64_drm
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            use_cross: false
            variant: "drm"
            cargo_args: "--no-default-features --features drm"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libfontconfig1-dev libfreetype6-dev libxkbcommon-dev"
          - name: linux_aarch64_drm_wayland
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            use_cross: false
            variant: "drm_wayland"
            cargo_args: "--no-default-features --features wayland,drm"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libfontconfig1-dev libfreetype6-dev libwayland-dev libxkbcommon-dev"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Set up Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.0"
          otp-version: "28.3"

      - name: Extract project version
        shell: bash
        run: echo "PROJECT_VERSION=$(mix emerge.version)" >> "$GITHUB_ENV"

      - name: Install Linux build dependencies
        if: ${{ matrix.job.system_packages != '' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes ${{ matrix.job.system_packages }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.job.target }}

      - name: Build the project
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: emerge_skia
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use_cross && 'true' || '' }}
          project-dir: native/emerge_skia
          variant: ${{ matrix.job.variant }}
          cargo-args: ${{ matrix.job.cargo_args }}

      - name: Artifact upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

      - name: Publish archives and packages
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build-crate.outputs.file-path }}
