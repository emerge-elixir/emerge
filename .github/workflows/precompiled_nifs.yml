name: Build Precompiled NIFs

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.name }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.15"]
        job:
          - name: linux_wayland
            target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            use_cross: false
            variant: ""
            cargo_args: "--no-default-features --features wayland"
            system_packages: "libegl1-mesa-dev libgbm-dev libdrm-dev libwayland-dev libxkbcommon-dev"
          - name: nerves_rpi5_drm
            target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            use_cross: true
            variant: "nerves_rpi5"
            cargo_args: "--no-default-features --features drm"
            system_packages: ""

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import pathlib, re

          match = re.search(r'version:\s*"([^"]+)"', pathlib.Path("mix.exs").read_text())
          if not match:
              raise SystemExit("Could not determine project version from mix.exs")

          print(f"PROJECT_VERSION={match.group(1)}")
          PY

      - name: Install Linux build dependencies
        if: ${{ matrix.job.system_packages != '' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes ${{ matrix.job.system_packages }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.job.target }}

      - name: Build the project
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: emerge_skia
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use_cross }}
          project-dir: native/emerge_skia
          variant: ${{ matrix.job.variant }}
          cargo-args: ${{ matrix.job.cargo_args }}

      - name: Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

      - name: Publish archives and packages
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build-crate.outputs.file-path }}
